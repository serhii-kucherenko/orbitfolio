# Production deploy once Vercel project + secrets exist.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Import: https://vercel.com/new/import?s=https://github.com/serhii-kucherenko/orbitfolio

name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Require Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Skip deploy: set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID after importing the repo on Vercel."
            exit 0
          fi
          echo "HAS_TOKEN=1" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        if: env.HAS_TOKEN == '1'
        with:
          node-version: 24
          cache: npm
      - name: Pull Vercel env
        if: env.HAS_TOKEN == '1'
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build for Vercel
        if: env.HAS_TOKEN == '1'
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy production
        if: env.HAS_TOKEN == '1'
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
